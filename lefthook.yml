pre-commit:
  commands:
    standardrb:
      run: |
        files="$(
          git diff --name-only --cached --diff-filter=ACMR -- '*.rb' '*.rake' 'Rakefile' 'Gemfile' |
            grep -Ev '(^|/)(application\\.rb|routes\\.rb)$' || true
        )"
        test -z "$files" || bundle exec standardrb --fix $files
